<style>
:root{
  --bg:#0a0e1a;
  --bg2:#0d1224;
  --bg3:#111828;
  --card:#131c2e;
  --card2:#0f1620;
  --blue:#3b82f6;
  --blue2:#60a5fa;
  --blue3:#93c5fd;
  --cyan:#06b6d4;
  --storm:#6366f1;
  --rain:#38bdf8;
  --sun:#fbbf24;
  --red:#ef4444;
  --green:#10b981;
  --border:#1e2d45;
  --text:#e2e8f0;
  --muted:#64748b;
  --muted2:#475569;
  --white:#f8fafc;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Baloo 2',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* ANIMATED BACKGROUND */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 20% -10%,rgba(59,130,246,0.12) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 110%,rgba(6,182,212,0.08) 0%,transparent 60%),
    radial-gradient(ellipse 40% 40% at 50% 50%,rgba(99,102,241,0.05) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}

/* RAIN EFFECT */
.rain-wrap{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.raindrop{
  position:absolute;top:-20px;
  width:1.5px;background:linear-gradient(to bottom,transparent,rgba(96,165,250,0.25));
  border-radius:2px;
  animation:fall linear infinite;
}
@keyframes fall{to{transform:translateY(110vh);}}

.page{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:16px 14px 40px;}

/* HEADER */
.hdr{
  text-align:center;padding:24px 16px 16px;
  position:relative;
}
.hdr-icon{
  font-size:56px;display:block;margin-bottom:8px;
  filter:drop-shadow(0 0 20px rgba(59,130,246,0.5));
  animation:iconFloat 4s ease-in-out infinite;
}
@keyframes iconFloat{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-8px) rotate(3deg)}}
.hdr-title{
  font-size:clamp(20px,5.5vw,28px);font-weight:800;
  background:linear-gradient(135deg,var(--white) 0%,var(--blue2) 40%,var(--cyan) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:0.5px;line-height:1.2;margin-bottom:4px;
}
.hdr-date{
  font-size:13px;color:var(--muted);
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.hdr-date::before,.hdr-date::after{content:'';flex:1;max-width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--border));}
.hdr-date::after{background:linear-gradient(90deg,var(--border),transparent);}

/* DIVIDER */
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:12px 0;}

/* CITY QUICK BUTTONS */
.quick-wrap{margin-bottom:14px;}
.quick-title{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;padding:0 2px;}
.quick-grid{display:flex;flex-wrap:wrap;gap:6px;}
.qbtn{
  padding:5px 12px;
  background:var(--card2);
  border:1px solid var(--border);
  color:var(--blue3);
  border-radius:20px;font-size:12px;font-weight:600;
  cursor:pointer;font-family:inherit;
  transition:all 0.2s;white-space:nowrap;
}
.qbtn:hover{background:rgba(59,130,246,0.15);border-color:var(--blue);color:var(--white);}
.qbtn.active{background:rgba(59,130,246,0.2);border-color:var(--blue2);color:var(--white);}

/* SEARCH */
.search-wrap{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;padding:14px;
  margin-bottom:14px;
}
.search-row{display:flex;gap:8px;margin-bottom:8px;}
.search-input{
  flex:1;min-width:0;
  background:var(--card2);
  border:1px solid var(--border);
  color:var(--white);
  padding:11px 14px;border-radius:10px;
  font-size:14px;font-family:inherit;outline:none;
  transition:all 0.25s;
}
.search-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,0.12);}
.search-input::placeholder{color:var(--muted2);}
.search-btn{
  padding:11px 16px;
  background:linear-gradient(135deg,var(--blue),var(--cyan));
  color:#fff;border:none;border-radius:10px;
  cursor:pointer;font-size:13px;font-weight:700;
  font-family:inherit;white-space:nowrap;flex-shrink:0;
  transition:all 0.2s;
  box-shadow:0 4px 14px rgba(59,130,246,0.3);
}
.search-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(59,130,246,0.4);}
.loc-btn{
  width:100%;padding:9px;
  background:var(--card2);
  border:1px solid var(--border);
  color:var(--muted);
  border-radius:10px;cursor:pointer;
  font-size:13px;font-family:inherit;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:all 0.2s;
}
.loc-btn:hover{border-color:var(--blue);color:var(--blue2);}

/* MESSAGES */
.msg{padding:10px 14px;border-radius:8px;margin-top:8px;font-size:13px;display:none;}
.msg-err{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:#fca5a5;}
.msg-load{
  background:rgba(59,130,246,0.08);
  border:1px solid rgba(59,130,246,0.2);
  color:var(--blue3);text-align:center;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.spinner{
  width:16px;height:16px;border-radius:50%;
  border:2px solid rgba(96,165,250,0.3);
  border-top-color:var(--blue2);
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* RESULT */
.result{display:none;animation:fadeUp 0.5s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

/* CITY NAME */
.city-name{
  text-align:center;font-size:18px;font-weight:700;
  color:var(--white);margin-bottom:12px;
  display:flex;align-items:center;justify-content:center;gap:6px;
}

/* MAIN STATUS CARD */
.main-card{
  background:linear-gradient(135deg,var(--card),#0c1628);
  border:1px solid var(--border);
  border-radius:16px;padding:20px 16px;
  text-align:center;margin-bottom:12px;
  position:relative;overflow:hidden;
}
.main-card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at top,rgba(59,130,246,0.06) 0%,transparent 70%);
}
.main-icon{font-size:52px;display:block;margin-bottom:8px;animation:iconFloat 3s ease-in-out infinite;}
.main-text{font-size:clamp(16px,4.5vw,20px);font-weight:700;color:var(--white);margin-bottom:4px;}
.main-sub{font-size:12px;color:var(--muted);}

/* TEMP ROW */
.temp-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.temp-card{
  border-radius:14px;padding:16px 12px;text-align:center;
  border:1px solid transparent;position:relative;overflow:hidden;
}
.temp-max{
  background:linear-gradient(135deg,rgba(239,68,68,0.12),rgba(239,68,68,0.04));
  border-color:rgba(239,68,68,0.25);
}
.temp-min{
  background:linear-gradient(135deg,rgba(59,130,246,0.12),rgba(59,130,246,0.04));
  border-color:rgba(59,130,246,0.25);
}
.temp-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px;}
.temp-val{font-size:clamp(28px,8vw,36px);font-weight:800;line-height:1;}
.temp-max .temp-val{color:#f87171;}
.temp-min .temp-val{color:var(--blue2);}
.temp-hint{font-size:10px;color:var(--muted2);margin-top:4px;}

/* INFO CARDS */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.info-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:14px 12px;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  transition:border-color 0.3s;
}
.info-icon{font-size:24px;}
.info-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.info-val{font-size:13px;font-weight:700;text-align:center;line-height:1.3;}
.info-bar-wrap{width:100%;background:rgba(255,255,255,0.06);border-radius:4px;height:4px;overflow:hidden;}
.info-bar{height:4px;border-radius:4px;transition:width 0.9s cubic-bezier(0.4,0,0.2,1);}
.bar-rain{background:linear-gradient(90deg,var(--blue),var(--cyan));}
.bar-wind{background:linear-gradient(90deg,var(--green),var(--sun),var(--red));}

/* RAIN COLORS */
.rain-lo .info-val{color:#34d399;}
.rain-lo{border-color:rgba(52,211,153,0.2)!important;}
.rain-md .info-val{color:var(--sun);}
.rain-md{border-color:rgba(251,191,36,0.2)!important;}
.rain-hi .info-val{color:var(--rain);}
.rain-hi{border-color:rgba(56,189,248,0.25)!important;}
.wind-lo .info-val{color:#34d399;}
.wind-lo{border-color:rgba(52,211,153,0.2)!important;}
.wind-md .info-val{color:var(--sun);}
.wind-md{border-color:rgba(251,191,36,0.2)!important;}
.wind-hi .info-val{color:#f87171;}
.wind-hi{border-color:rgba(239,68,68,0.25)!important;}

/* SHARE BTN */
.share-wrap{margin-bottom:16px;}
.share-btn{
  width:100%;padding:12px;
  background:linear-gradient(135deg,#25d366,#128c7e);
  color:#fff;border:none;border-radius:12px;
  font-size:14px;font-weight:700;cursor:pointer;
  font-family:inherit;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all 0.2s;
  box-shadow:0 4px 16px rgba(37,211,102,0.25);
}
.share-btn:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(37,211,102,0.35);}

/* LUCKY NUMBER LINK */
.lucky-link{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 14px;
  background:linear-gradient(135deg,rgba(99,102,241,0.12),rgba(168,85,247,0.08));
  border:1px solid rgba(99,102,241,0.25);
  border-radius:12px;
  text-decoration:none;color:var(--text);
  font-size:13px;font-weight:600;
  transition:all 0.2s;margin-bottom:14px;
}
.lucky-link:hover{border-color:rgba(99,102,241,0.5);color:var(--white);}
.lucky-link-left{display:flex;align-items:center;gap:8px;}
.lucky-link-right{font-size:12px;color:var(--storm);opacity:0.8;}

/* LINKS SECTION */
.links-section{margin-bottom:8px;}
.links-tab-bar{
  display:flex;gap:6px;flex-wrap:wrap;
  margin-bottom:12px;
}
.ltab{
  padding:5px 14px;border-radius:20px;
  background:var(--card2);border:1px solid var(--border);
  color:var(--muted);font-size:12px;font-weight:600;
  cursor:pointer;font-family:inherit;transition:all 0.2s;
  white-space:nowrap;
}
.ltab.on{background:rgba(59,130,246,0.15);border-color:var(--blue);color:var(--blue2);}
.ltab:hover{color:var(--text);}

.link-panel{display:none;}
.link-panel.on{display:block;animation:fadeUp 0.3s ease;}

.link-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.litem{
  display:flex;align-items:flex-start;gap:7px;
  padding:9px 10px;
  background:var(--card);border:1px solid var(--border);
  border-radius:10px;text-decoration:none;
  color:var(--muted);font-size:12px;line-height:1.4;
  transition:all 0.2s;
}
.litem:hover{border-color:var(--blue);color:var(--text);background:rgba(59,130,246,0.06);}
.litem-icon{font-size:14px;flex-shrink:0;margin-top:1px;}

/* FOOTER */
.footer{
  text-align:center;padding-top:14px;
  border-top:1px solid var(--border);
  font-size:11px;color:var(--muted2);line-height:1.9;
}

/* STARS BG */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.star{position:absolute;border-radius:50%;background:rgba(255,255,255,0.6);animation:twinkle var(--d) var(--delay) infinite;}
@keyframes twinkle{0%,100%{opacity:0;}50%{opacity:var(--op);}}

@media(max-width:400px){
  .temp-val{font-size:26px;}
  .quick-grid{gap:5px;}
  .link-grid{grid-template-columns:1fr;}
}
</style>

// ── WEATHER LOGIC ──
function showErr(m){$('msgErr').style.display='block';$('msgErr').textContent=m;$('msgLoad').style.display='none';$('result').style.display='none';}
function showLoad(){$('msgErr').style.display='none';$('msgLoad').style.display='flex';$('result').style.display='none';}
function showResult(){$('msgLoad').style.display='none';$('msgErr').style.display='none';$('result').style.display='block';}

async function geo1(q){
  try{var r=await fetch('https://api.openweathermap.org/geo/1.0/direct?q='+encodeURIComponent(q)+',IN'+AMP+'limit=1'+AMP+'appid=294b9df6df9e686a2bfb565460e5fe6c');var d=await r.json();if(Array.isArray(d)&&d.length)return{lat:d[0].lat,lon:d[0].lon,name:d[0].name};}catch(e){}return null;
}
async function geo2(q){
  try{var r=await fetch('https://geocoding-api.open-meteo.com/v1/search?name='+encodeURIComponent(q)+AMP+'count=1');var d=await r.json();if(d&&d.results&&d.results.length)return{lat:d.results[0].latitude,lon:d.results[0].longitude,name:d.results[0].name};}catch(e){}return null;
}
async function geo3(q){
  try{var r=await fetch('https://nominatim.openstreetmap.org/search?format=json'+AMP+'limit=1'+AMP+'q='+encodeURIComponent(q+', India'));var d=await r.json();if(Array.isArray(d)&&d.length)return{lat:parseFloat(d[0].lat),lon:parseFloat(d[0].lon),name:(d[0].display_name||'').split(',')[0]||q};}catch(e){}return null;
}

async function fetchWeather(lat,lon,name){
  showLoad();
  try{
    var r=await fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+AMP+'longitude='+lon+AMP+'daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,wind_speed_10m_max'+AMP+'timezone=auto');
    var d=await r.json();
    if(!d||!d.daily)throw new Error('no data');
    var w={tmax:d.daily.temperature_2m_max[0],tmin:d.daily.temperature_2m_min[0],rain:d.daily.precipitation_probability_max[0],wind:d.daily.wind_speed_10m_max[0]};
    lastWeather=w;lastCity=name;
    showResult();
    render(name,w);
  }catch(e){showErr('\u0921\u0947\u091F\u0093E \u0928\u0939\u0940\u0902 \u092E\u093F\u0932\u093E, \u0925\u094B\u0921\u093C\u0940 \u0926\u0947\u0930 \u092C\u093E\u0926 try \u0915\u0930\u0947\u0902');}
}

function render(name,w){
  $('cityName').textContent=name;
  $('tMax').textContent=w.tmax+DEG+'C';
  $('tMin').textContent=w.tmin+DEG+'C';
  var icon,text,sub;
  if(w.rain>60){icon='🌧️';text='\u0906\u091C \u092D\u093E\u0930\u0940 \u092C\u093E\u0930\u093F\u0936 \u0939\u094B\u0917\u0940';sub='\u091B\u093E\u0924\u093E \u0914\u0930 \u0930\u0947\u0928\u0915\u094B\u091F \u0938\u093E\u0925 \u0930\u0916\u0947\u0902';}
  else if(w.rain>30){icon='🌦️';text='\u0939\u0932\u094D\u0915\u0940 \u092C\u093E\u0930\u093F\u0936 \u0939\u094B \u0938\u0915\u0924\u0940 \u0939\u0948';sub='\u091B\u093E\u0924\u093E \u0938\u093E\u0925 \u0930\u0916\u0947\u0902 \u0924\u094B \u0905\u091A\u094D\u091B\u093E \u0939\u0948';}
  else if(w.wind>40){icon='🌪️';text='\u0924\u0942\u092B\u093E\u0928 \u0915\u093E \u0916\u0924\u0930\u093E \u26A0\uFE0F';sub='\u092C\u093E\u0939\u0930 \u0938\u093E\u0935\u0927\u093E\u0928\u0940 \u0938\u0947 \u0928\u093F\u0915\u0932\u0947\u0902';}
  else if(w.tmax>42){icon='🔥';text='\u092C\u0939\u0941\u0924 \u0924\u0947\u091C \u0917\u0930\u094D\u092E\u0940 — \u0932\u0942 \u0915\u093E \u0916\u0924\u0930\u093E';sub='\u0926\u094B\u092A\u0939\u0930 \u092E\u0947\u0902 \u092C\u093E\u0939\u0930 \u0928 \u091C\u093E\u090F\u0902, \u092A\u093E\u0928\u0940 \u092A\u093F\u090F\u0902';}
  else if(w.tmax>38){icon='☀️';text='\u0924\u0947\u091C \u0927\u0942\u092A \u0914\u0930 \u0917\u0930\u094D\u092E\u0940';sub='\u0927\u0942\u092A \u0938\u0947 \u092C\u091A\u0947\u0902, \u0939\u093E\u0908\u0921\u094D\u0930\u0947\u091F \u0930\u0939\u0947\u0902';}
  else if(w.tmax<12){icon='🥶';text='\u0915\u0921\u093C\u093E\u0915\u0947 \u0915\u0940 \u0920\u0902\u0921';sub='\u0917\u0930\u094D\u092E \u0915\u092A\u0921\u093C\u0947 \u092A\u0939\u0928\u0947\u0902, \u092C\u093E\u0939\u0930 \u0938\u093E\u0935\u0927\u093E\u0928';}
  else if(w.tmax<18){icon='❄️';text='\u0920\u0902\u0921 \u0915\u093E \u0905\u0938\u0930';sub='\u0917\u0930\u094D\u092E \u0915\u092A\u0921\u093C\u0947 \u091C\u0930\u0942\u0930 \u092A\u0939\u0928\u0947\u0902';}
  else{icon='🌤️';text='\u092E\u094C\u0938\u092E \u090F\u0915\u0926\u092E \u0938\u093E\u092B';sub='\u0906\u091C \u0915\u093E \u0926\u093F\u0928 \u0905\u091A\u094D\u091B\u093E \u0939\u0948!';}
  $('mainIcon').textContent=icon;
  $('hdrIcon').textContent=icon;
  $('mainText').textContent=text;
  $('mainSub').textContent=sub;

  var rc=$('rainCard'),rainTxt,rainCls;
  if(w.rain<20){rainTxt='\u092C\u093E\u0930\u093F\u0936 \u0928\u0939\u0940\u0902 \u0939\u094B\u0917\u0940';rainCls='rain-lo';}
  else if(w.rain<50){rainTxt='\u0939\u0932\u094D\u0915\u0940 \u092C\u093E\u0930\u093F\u0936 ('+w.rain+'%)';rainCls='rain-md';}
  else{rainTxt='\u092A\u0915\u094D\u0915\u093E \u092C\u093E\u0930\u093F\u0936 \u2614 ('+w.rain+'%)';rainCls='rain-hi';}
  rc.className='info-card '+rainCls;
  $('rainVal').textContent=rainTxt;
  $('rainBar').style.width=Math.min(w.rain,100)+'%';

  var wc=$('windCard'),windTxt,windCls;
  if(w.wind<20){windTxt='\u0939\u0935\u093E \u0938\u093E\u092E\u093E\u0928\u094D\u092F ('+Math.round(w.wind)+' km/h)';windCls='wind-lo';}
  else if(w.wind<40){windTxt='\u0924\u0947\u091C \u0939\u0935\u093E ('+Math.round(w.wind)+' km/h)';windCls='wind-md';}
  else{windTxt='\u0924\u0942\u092B\u093E\u0928! ('+Math.round(w.wind)+' km/h)';windCls='wind-hi';}
  wc.className='info-card '+windCls;
  $('windVal').textContent=windTxt;
  $('windBar').style.width=Math.min((w.wind/80)*100,100)+'%';
}

window.doSearch=async function(){
  var q=($('cityInput').value||'').trim();
  if(!q)return showErr('\u0936\u0939\u0930 \u0915\u093E \u0928\u093E\u092E \u0932\u093F\u0916\u0947\u0902');
  showLoad();
  var g=(await geo1(q))||(await geo2(q))||(await geo3(q));
  if(!g)return showErr('\u0936\u0939\u0930 \u0928\u0939\u0940\u0902 \u092E\u093F\u0932\u093E — \u0926\u0942\u0938\u0930\u0947 \u0928\u093E\u092E \u0938\u0947 try \u0915\u0930\u0947\u0902');
  fetchWeather(g.lat,g.lon,g.name);
};

window.doLocation=function(){
  if(!navigator.geolocation)return showErr('Location support \u0928\u0939\u0940\u0902 \u0939\u0948');
  showLoad();
  navigator.geolocation.getCurrentPosition(
    function(p){fetchWeather(p.coords.latitude,p.coords.longitude,'\u0906\u092A\u0915\u0940 \u0932\u094B\u0915\u0947\u0936\u0928 \uD83D\uDCCD');},
    function(){showErr('Location permission \u0926\u0947\u0902');},
    {enableHighAccuracy:true,timeout:10000}
  );
};

window.doShare=function(){
  if(!lastWeather)return;
  var w=lastWeather;
  var msg='\u26C5 \u0906\u091C \u0915\u093E \u092E\u094C\u0938\u092E \u2014 '+lastCity+'\n\n'+
    '\uD83C\uDF21\uFE0F \u0905\u0927\u093F\u0915\u0924\u092E: '+w.tmax+DEG+'C | \u0928\u094D\u092F\u0942\u0928\u0924\u092E: '+w.tmin+DEG+'C\n'+
    '\uD83C\uDF27\uFE0F \u092C\u093E\u0930\u093F\u0936: '+w.rain+'%\n'+
    '\uD83C\uDF2A\uFE0F \u0939\u0935\u093E: '+Math.round(w.wind)+' km/h\n\n'+
    '\uD83D\uDD17 \u0905\u092A\u0928\u0947 \u0936\u0939\u0930 \u0915\u093E \u092E\u094C\u0938\u092E \u0926\u0947\u0916\u0947\u0902:\nhttps://mausam.vhoriginal.com';
  window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
};
</script>
