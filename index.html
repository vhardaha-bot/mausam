*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg); color:var(--text);
  font-family:'Noto Sans Devanagari',sans-serif;
  min-height:100vh; overflow-x:hidden;
  font-size:17px; line-height:1.6;
}
body::before{
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background:

    radial-gradient(ellipse 70% 45% at 85% 105%,rgba(6,182,212,0.08) 0%,transparent 60%),
    radial-gradient(ellipse 50% 50% at 50% 50%,rgba(99,102,241,0.04) 0%,transparent 70%);
}

/* STARS */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.star{position:absolute;border-radius:50%;background:rgba(255,255,255,0.7);opacity:0;animation:twinkle var(--d) var(--delay) infinite;}
@keyframes twinkle{0%,100%{opacity:0}50%{opacity:var(--op)}}

/* RAIN */
.rain-wrap{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.raindrop{position:absolute;top:-30px;width:1.5px;background:linear-gradient(to bottom,transparent,rgba(96,165,250,0.22));border-radius:2px;animation:fall linear infinite;}
@keyframes fall{to{transform:translateY(110vh)}}

/* LAYOUT */
.wrap{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:0 0 60px;}

/* ── TOP RESULT BAR ── */
.result-bar{
  position:sticky;top:0;z-index:100;
  background:rgba(10,14,26,0.92);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border2);
  padding:12px 16px;
  min-height:60px;
  display:flex;align-items:center;
  transform:translateY(-100%);
  transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
.result-bar.show{transform:translateY(0);}
.result-bar-inner{
  display:flex;align-items:center;gap:12px;
  width:100%;
}
.rb-icon{font-size:32px;flex-shrink:0;animation:floatIcon 3s ease-in-out infinite;}

.rb-info{flex:1;min-width:0;}
.rb-city{font-size:13px;color:var(--blue3);font-weight:600;margin-bottom:1px;}
.rb-status{font-size:16px;font-weight:800;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rb-temps{display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0;gap:2px;}
.rb-max{font-size:20px;font-weight:800;color:#f87171;line-height:1;}
.rb-min{font-size:14px;font-weight:600;color:var(--blue2);}
.rb-chips{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.rb-chip{
  font-size:12px;font-weight:700;padding:3px 10px;border-radius:12px;
  border:1px solid transparent;
}
.chip-rain-lo{background:rgba(52,211,153,0.1);border-color:rgba(52,211,153,0.3);color:#34d399;}
.chip-rain-md{background:rgba(251,191,36,0.1);border-color:rgba(251,191,36,0.3);color:var(--sun);}
.chip-rain-hi{background:rgba(56,189,248,0.1);border-color:rgba(56,189,248,0.3);color:var(--rain);}
.chip-wind-lo{background:rgba(52,211,153,0.1);border-color:rgba(52,211,153,0.3);color:#34d399;}
.chip-wind-md{background:rgba(251,191,36,0.1);border-color:rgba(251,191,36,0.3);color:var(--sun);}
.chip-wind-hi{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.3);color:#f87171;}
.rb-share{

.rb-share:hover{background:rgba(37,211,102,0.3);transform:scale(1.1);}
.rb-row2{display:flex;align-items:center;gap:8px;width:100%;margin-top:8px;}

/* ── HEADER ── */
.hdr{padding:22px 16px 14px;text-align:center;}
.hdr-icon{font-size:60px;display:block;margin-bottom:8px;filter:drop-shadow(0 0 18px rgba(59,130,246,0.5));animation:floatBig 4s ease-in-out infinite;}
@keyframes floatBig{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-9px) rotate(2deg)}}
.hdr-tag{font-size:12px;color:var(--blue2);letter-spacing:3px;text-transform:uppercase;font-weight:700;margin-bottom:4px;}
.hdr-title{font-size:clamp(22px,6vw,32px);font-weight:800;color:var(--white);margin-bottom:4px;line-height:1.2;}
.hdr-title em{color:var(--blue2);font-style:normal;}
.hdr-date{font-size:15px;color:var(--muted);}

.divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:14px 16px;}

/* ── CITY SECTION ── */
.city-section{padding:0 16px;margin-bottom:18px;}
.section-head{font-size:16px;font-weight:700;color:var(--white);margin-bottom:10px;}
.quick-grid{display:flex;flex-wrap:wrap;gap:8px;}
.qbtn{
  padding:9px 18px;
  background:var(--card2);border:1.5px solid var(--border2);
  color:var(--blue3);border-radius:24px;
  font-size:16px;font-weight:700;
  cursor:pointer;font-family:inherit;
  transition:background 0.2s,border-color 0.2s,color 0.2s,transform 0.15s,box-shadow 0.2s;
  white-space:nowrap;
}
.qbtn:hover{background:rgba(59,130,246,0.18);border-color:var(--blue2);color:var(--white);transform:translateY(-2px);}
.qbtn:active{transform:scale(0.96);}
.qbtn.active{
  background:rgba(59,130,246,0.25);border-color:var(--blue2);color:var(--white);
  box-shadow:0 0 14px rgba(59,130,246,0.35);
  animation:btnPulse 0.35s ease;
}
@keyframes btnPulse{0%{transform:scale(1)}40%{transform:scale(1.07)}100%{transform:scale(1)}}

/* ── SEARCH SECTION ── */
.search-section{padding:0 16px;margin-bottom:18px;}
.search-wrap{background:var(--card);border:1.5px solid var(--border2);border-radius:16px;padding:14px;}
.search-row{display:flex;gap:8px;margin-bottom:8px;}
.search-input{
  flex:1;min-width:0;
  background:var(--card2);border:1.5px solid var(--border);
  color:var(--white);padding:13px 16px;border-radius:12px;
  font-size:16px;font-family:inherit;outline:none;

}
.search-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,0.13);}
.search-input::placeholder{color:var(--muted2);font-size:14px;}
.search-btn{
  padding:13px 18px;
  background:linear-gradient(135deg,var(--blue),var(--cyan));
  color:#fff;border:none;border-radius:12px;
  cursor:pointer;font-size:16px;font-weight:800;
  font-family:inherit;white-space:nowrap;flex-shrink:0;
  transition:transform 0.2s,box-shadow 0.2s;
  box-shadow:0 4px 14px rgba(59,130,246,0.3);
}
.search-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(59,130,246,0.4);}
.search-btn:active{transform:scale(0.97);}
.loc-btn{
  width:100%;padding:12px;background:var(--card2);
  border:1.5px solid var(--border);color:var(--muted);
  border-radius:12px;cursor:pointer;font-size:15px;
  font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;
  transition:border-color 0.2s,color 0.2s;
}
.loc-btn:hover{border-color:var(--blue);color:var(--blue2);}
.msg{padding:11px 14px;border-radius:10px;margin-top:10px;font-size:15px;display:none;}
.msg-err{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:#fca5a5;}
.msg-txt{background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.2);color:var(--blue3);text-align:center;font-size:15px;}

/* ── LUCKY LINK ── */
.lucky-wrap{padding:0 16px;margin-bottom:18px;}
.lucky-link{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;
  background:linear-gradient(135deg,rgba(99,102,241,0.12),rgba(168,85,247,0.08));
  border:1.5px solid rgba(99,102,241,0.28);border-radius:14px;
  text-decoration:none;color:var(--text);font-size:16px;font-weight:700;

.lucky-left{display:flex;align-items:center;gap:10px;}
.lucky-right{font-size:13px;color:#a5b4fc;white-space:nowrap;}

/* ── LINKS SECTION ── */
.links-section{padding:0 16px;}
.links-tab-bar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px;}
.ltab{
  padding:8px 16px;border-radius:22px;
  background:var(--card2);border:1.5px solid var(--border);
  color:var(--muted);font-size:15px;font-weight:700;
  cursor:pointer;font-family:inherit;
  transition:background 0.2s,border-color 0.2s,color 0.2s,transform 0.15s;
  white-space:nowrap;
}
.ltab.on{background:rgba(59,130,246,0.15);border-color:var(--blue);color:var(--blue2);}
.ltab:hover{color:var(--text);transform:translateY(-1px);}
.link-panel{display:none;}
.link-panel.on{display:block;animation:fadeUp 0.3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.link-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.litem{
  display:flex;align-items:flex-start;gap:8px;
  padding:11px 12px;
  background:var(--card);border:1.5px solid var(--border);
  border-radius:12px;text-decoration:none;
  color:var(--muted);font-size:14px;line-height:1.4;
  transition:border-color 0.2s,color 0.2s,background 0.2s,transform 0.15s;
}
.litem:hover{border-color:var(--blue);color:var(--white);background:rgba(59,130,246,0.07);transform:translateY(-2px);}
.litem:active{transform:scale(0.97);}
.litem-icon{font-size:16px;flex-shrink:0;margin-top:1px;}

/* ── FOOTER ── */
.footer{
  text-align:center;padding:20px 16px 8px;
  border-top:1px solid var(--border);margin-top:20px;
  font-size:13px;color:var(--muted2);line-height:2;
}
.install-hint{
  display:inline-flex;align-items:center;gap:6px;
  margin-top:8px;padding:10px 16px;
  background:rgba(59,130,246,0.07);border:1px solid rgba(59,130,246,0.2);
  border-radius:10px;font-size:13px;color:var(--blue3);line-height:1.5;
}

@media(max-width:380px){
  .qbtn{font-size:14px;padding:8px 14px;}
  .link-grid{grid-template-columns:1fr;}
  .rb-status{font-size:14px;}
}
</style>

// Weather fetch
function showErr(m){$('msgErr').style.display='block';$('msgErr').textContent=m;$('msgTxt').style.display='none';}
function showTxt(m){$('msgTxt').style.display='block';$('msgTxt').textContent=m;$('msgErr').style.display='none';}
function hideMsgs(){$('msgErr').style.display='none';$('msgTxt').style.display='none';}

async function fetchW(lat,lon,name){
  showTxt('\u0921\u0947\u091F\u093E \u0906 \u0930\u0939\u093E \u0939\u0948\u2026');
  try{
    var url='https://api.open-meteo.com/v1/forecast?latitude='+lat+AMP+'longitude='+lon+AMP+'daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,wind_speed_10m_max'+AMP+'timezone=Asia%2FKolkata'+AMP+'forecast_days=1';
    var resp=await fetch(url);
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    var d=await resp.json();
    if(!d||!d.daily||!d.daily.temperature_2m_max)throw new Error('bad data');
    var w={
      tmax:Math.round(d.daily.temperature_2m_max[0]),
      tmin:Math.round(d.daily.temperature_2m_min[0]),
      rain:d.daily.precipitation_probability_max[0]||0,
      wind:Math.round(d.daily.wind_speed_10m_max[0]||0)
    };
    lastW=w;lastCity=name;
    hideMsgs();
    renderBar(name,w);
  }catch(e){
    hideMsgs();
    showErr('\u0921\u0947\u091F\u093E \u0928\u0939\u0940\u0902 \u092E\u093F\u0932\u093E \u2014 \u0925\u094B\u0921\u093C\u0940 \u0926\u0947\u0930 \u092C\u093E\u0926 try \u0915\u0930\u0947\u0902');
  }
}

function renderBar(name,w){
  // Status
  var icon,text;
  if(w.rain>60){icon='🌧️';text='\u0906\u091C \u092D\u093E\u0930\u0940 \u092C\u093E\u0930\u093F\u0936';}
  else if(w.rain>30){icon='🌦️';text='\u0939\u0932\u094D\u0915\u0940 \u092C\u093E\u0930\u093F\u0936 \u0938\u0902\u092D\u0935';}
  else if(w.wind>40){icon='🌪️';text='\u0924\u0942\u092B\u093E\u0928 \u0915\u093E \u0916\u0924\u0930\u093E \u26A0\uFE0F';}
  else if(w.tmax>42){icon='🔥';text='\u0932\u0942 \u0915\u093E \u0916\u0924\u0930\u093E \u2014 \u0918\u0930 \u0930\u0939\u0947\u0902';}
  else if(w.tmax>38){icon='☀️';text='\u0924\u0947\u091C \u0927\u0942\u092A \u0914\u0930 \u0917\u0930\u094D\u092E\u0940';}
  else if(w.tmax<12){icon='🥶';text='\u0915\u0921\u093C\u093E\u0915\u0947 \u0915\u0940 \u0920\u0902\u0921';}
  else if(w.tmax<18){icon='❄️';text:'\u0920\u0902\u0921 \u0915\u093E \u0905\u0938\u0930';}
  else{icon='🌤️';text='\u092E\u094C\u0938\u092E \u0938\u093E\u092B \u0939\u0948';}

  $('rbIcon').textContent=icon;
  $('hdrIcon').textContent=icon;
  $('rbCity').textContent='\uD83D\uDCCD '+name;
  $('rbStatus').textContent=text;
  $('rbMax').textContent=w.tmax+DEG+'C';
  $('rbMin').textContent=w.tmin+DEG+'C';

  // Chips
  var rainCls,rainTxt;
  if(w.rain<20){rainCls='chip-rain-lo';rainTxt='\uD83C\uDF1F \u092C\u093E\u0930\u093F\u0936 \u0928\u0939\u0940\u0902';}
  else if(w.rain<50){rainCls='chip-rain-md';rainTxt='\uD83C\uDF27\uFE0F \u0939\u0932\u094D\u0915\u0940 \u092C\u093E\u0930\u093F\u0936 ('+w.rain+'%)';}
  else{rainCls='chip-rain-hi';rainTxt='\u2614 \u092A\u0915\u094D\u0915\u093E \u092C\u093E\u0930\u093F\u0936 ('+w.rain+'%)';}

  var windCls,windTxt;
  if(w.wind<20){windCls='chip-wind-lo';windTxt='\uD83C\uDF43 \u0938\u093E\u092E\u093E\u0928\u094D\u092F \u0939\u0935\u093E';}
  else if(w.wind<40){windCls='chip-wind-md';windTxt='\uD83D\uDCA8 \u0924\u0947\u091C \u0939\u0935\u093E ('+w.wind+' km/h)';}
  else{windCls='chip-wind-hi';windTxt='\uD83C\uDF2A\uFE0F \u0924\u0942\u092B\u093E\u0928! ('+w.wind+' km/h)';}

  $('rbChips').innerHTML=
    '<span class="rb-chip '+rainCls+'">'+rainTxt+'</span>'+
    '<span class="rb-chip '+windCls+'">'+windTxt+'</span>';

  $('resultBar').classList.add('show');
}

// Search geo
async function geo1(q){try{var r=await fetch('https://api.openweathermap.org/geo/1.0/direct?q='+encodeURIComponent(q)+',IN'+AMP+'limit=1'+AMP+'appid=294b9df6df9e686a2bfb565460e5fe6c');var d=await r.json();if(Array.isArray(d)&&d.length)return{lat:d[0].lat,lon:d[0].lon,name:d[0].name};}catch(e){}return null;}
async function geo2(q){try{var r=await fetch('https://geocoding-api.open-meteo.com/v1/search?name='+encodeURIComponent(q)+AMP+'count=1'+AMP+'language=en'+AMP+'country_code=IN');var d=await r.json();if(d&&d.results&&d.results.length)return{lat:d.results[0].latitude,lon:d.results[0].longitude,name:d.results[0].name};}catch(e){}return null;}
async function geo3(q){try{var r=await fetch('https://nominatim.openstreetmap.org/search?format=json'+AMP+'limit=1'+AMP+'q='+encodeURIComponent(q+', India'));var d=await r.json();if(Array.isArray(d)&&d.length)return{lat:parseFloat(d[0].lat),lon:parseFloat(d[0].lon),name:(d[0].display_name||'').split(',')[0]||q};}catch(e){}return null;}

window.doSearch=async function(){
  var q=($('cityInput').value||'').trim();
  if(!q)return showErr('\u0936\u0939\u0930 \u0915\u093E \u0928\u093E\u092E \u0932\u093F\u0916\u0947\u0902');
  showTxt('\u0936\u0939\u0930 \u0922\u0942\u0902\u0922 \u0930\u0939\u0947 \u0939\u0948\u0902\u2026');
  var g=(await geo1(q))||(await geo2(q))||(await geo3(q));
  if(!g){return showErr('\u0936\u0939\u0930 \u0928\u0939\u0940\u0902 \u092E\u093F\u0932\u093E \u2014 \u0926\u0942\u0938\u0930\u0947 \u0928\u093E\u092E \u0938\u0947 try \u0915\u0930\u0947\u0902');}
  fetchW(g.lat,g.lon,g.name);
};

window.doLocation=function(){
  if(!navigator.geolocation)return showErr('Location support \u0928\u0939\u0940\u0902 \u0939\u0948');
  showTxt('\u0932\u094B\u0915\u0947\u0936\u0928 \u092A\u0924\u093E \u0915\u0930 \u0930\u0939\u0947 \u0939\u0948\u0902\u2026');
  navigator.geolocation.getCurrentPosition(
    function(p){fetchW(p.coords.latitude,p.coords.longitude,'\u0906\u092A\u0915\u0940 \u0932\u094B\u0915\u0947\u0936\u0928');},
    function(){showErr('Location permission \u0926\u0947\u0902');},
    {enableHighAccuracy:true,timeout:10000}
  );
};

window.doShare=function(){
  if(!lastW)return;
  var w=lastW;
  var msg='\u26C5 \u0906\u091C \u0915\u093E \u092E\u094C\u0938\u092E \u2014 '+lastCity+'\n\n'+
    '\uD83C\uDF21\uFE0F \u0905\u0927\u093F\u0915\u0924\u092E: '+w.tmax+DEG+'C | \u0928\u094D\u092F\u0942\u0928\u0924\u092E: '+w.tmin+DEG+'C\n'+
    '\uD83C\uDF27\uFE0F \u092C\u093E\u0930\u093F\u0936: '+w.rain+'%\n'+
    '\uD83C\uDF2A\uFE0F \u0939\u0935\u093E: '+w.wind+' km/h\n\n'+

  window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
};
